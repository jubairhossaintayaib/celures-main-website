<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders — Celures Admin</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="css/admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="admin-loading-gate" id="admin-loading-gate">Checking access…</div>
<div id="admin-app" style="display:none;">

<nav class="primary-nav">
  <div class="container" style="max-width:1000px;">
    <button class="hamburger-btn" aria-label="Menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 6H21M3 12H21M3 18H21" stroke="#111" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <a href="orders.html" class="nav-logo">CELURES ADMIN</a>
    <div class="nav-links">
      <a href="reports.html" id="nav-reports-link" style="display:none;">Reports</a>
      <a href="team.html" id="nav-team-link" style="display:none;">Team</a>
    </div>
    <div class="nav-right">
      <button class="admin-logout-btn" onclick="adminLogout()">Log Out</button>
    </div>
  </div>
</nav>
<div class="nav-drawer">
  <div class="nav-drawer-overlay"></div>
  <div class="nav-drawer-panel">
    <button class="nav-drawer-close btn-icon-circular" aria-label="Close menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 6L18 18M6 18L18 6" stroke="#111" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <a href="orders.html">Orders</a>
    <a href="reports.html" id="drawer-reports-link" style="display:none;">Reports</a>
    <a href="team.html" id="drawer-team-link" style="display:none;">Team</a>
    <a href="#" onclick="adminLogout(); return false;">Log Out</a>
  </div>
</div>

<main class="admin-main">
  <div class="admin-page-title">Orders</div>

  <div class="admin-tab-bar" id="tab-bar">
    <button type="button" data-tab="all" class="active">All Orders</button>
    <button type="button" data-tab="unconfirmed">Unconfirmed Orders</button>
    <button type="button" data-tab="ready">Ready For Dispatch</button>
    <button type="button" data-tab="dispatched">Dispatched</button>
    <button type="button" data-tab="cancelled">Cancelled Orders</button>
  </div>

  <div class="admin-filter-bar">
    <div class="admin-filter-field">
      <label>From</label>
      <input type="date" id="filter-from">
    </div>
    <div class="admin-filter-field">
      <label>To</label>
      <input type="date" id="filter-to">
    </div>
    <div class="admin-filter-field" style="flex:2;min-width:180px;">
      <label>Search (name / phone / order ID)</label>
      <input type="text" id="filter-search" placeholder="Search...">
    </div>
    <div class="admin-quick-dates" id="quick-dates">
      <button type="button" data-range="today">Today</button>
      <button type="button" data-range="yesterday">Yesterday</button>
      <button type="button" data-range="week">This Week</button>
      <button type="button" data-range="all" class="active">All</button>
    </div>
  </div>

  <div id="orders-list"></div>
  <div class="order-empty-state" id="orders-empty" style="display:none;">No orders match this filter.</div>
</main>

</div>

<script src="../js/supabase-config.js"></script>
<script src="../js/main.js"></script>
<script src="js/bd-time.js"></script>
<script src="js/auth-guard.js"></script>
<script>
(function () {
  let allOrders = [];
  let currentTab = 'all';

  const TABS = {
    all: {
      label: 'All Orders', dateColumn: 'created_at', sortColumn: 'created_at', sortAsc: false,
      filter: null
    },
    unconfirmed: {
      label: 'Unconfirmed Orders', dateColumn: 'created_at', sortColumn: 'created_at', sortAsc: false,
      filter: function (q) { return q.eq('is_confirmed', false).eq('is_cancelled', false); }
    },
    ready: {
      label: 'Ready For Dispatch', dateColumn: 'dispatch_date', sortColumn: 'dispatch_date', sortAsc: true,
      filter: function (q) { return q.eq('is_confirmed', true).eq('is_dispatched', false).eq('is_cancelled', false); }
    },
    dispatched: {
      label: 'Dispatched', dateColumn: 'dispatch_date', sortColumn: 'dispatch_date', sortAsc: false,
      filter: function (q) { return q.eq('is_dispatched', true); }
    },
    cancelled: {
      label: 'Cancelled Orders', dateColumn: 'cancelled_at', sortColumn: 'cancelled_at', sortAsc: false,
      filter: function (q) { return q.eq('is_cancelled', true); }
    }
  };

  /* ---------- Tab switching ---------- */
  document.getElementById('tab-bar').addEventListener('click', function (e) {
    const btn = e.target.closest('button[data-tab]');
    if (!btn) return;
    currentTab = btn.getAttribute('data-tab');
    document.querySelectorAll('#tab-bar button').forEach(function (b) {
      b.classList.toggle('active', b === btn);
    });
    loadOrders();
  });

  /* ---------- Date range ---------- */
  function setActiveQuickRange(key) {
    document.querySelectorAll('#quick-dates button').forEach(function (b) {
      b.classList.toggle('active', b.getAttribute('data-range') === key);
    });
  }

  function applyQuickRange(key) {
    const from = document.getElementById('filter-from');
    const to = document.getElementById('filter-to');
    if (key === 'today') {
      from.value = bdDateString(0); to.value = bdDateString(0);
    } else if (key === 'yesterday') {
      from.value = bdDateString(-1); to.value = bdDateString(-1);
    } else if (key === 'week') {
      from.value = bdWeekStart(); to.value = bdDateString(0);
    } else if (key === 'all') {
      from.value = ''; to.value = '';
    }
    setActiveQuickRange(key);
    loadOrders();
  }

  document.querySelectorAll('#quick-dates button').forEach(function (btn) {
    btn.addEventListener('click', function () { applyQuickRange(btn.getAttribute('data-range')); });
  });
  document.getElementById('filter-from').addEventListener('change', function () { setActiveQuickRange(''); loadOrders(); });
  document.getElementById('filter-to').addEventListener('change', function () { setActiveQuickRange(''); loadOrders(); });
  document.getElementById('filter-search').addEventListener('input', renderOrders);

  function applyDateRange(query, dateColumn, from, to) {
    if (dateColumn === 'dispatch_date') {
      if (from) query = query.gte('dispatch_date', from);
      if (to) query = query.lte('dispatch_date', to);
    } else {
      if (from) query = query.gte(dateColumn, bdMidnightUTC(from));
      if (to) query = query.lt(dateColumn, bdMidnightUTC(addDaysToDateString(to, 1)));
    }
    return query;
  }

  /* ---------- Load + render ---------- */
  async function loadOrders() {
    const tab = TABS[currentTab];
    let query = supabaseClient.from('orders').select('*');
    if (tab.filter) query = tab.filter(query);
    query = query.order(tab.sortColumn, { ascending: tab.sortAsc, nullsFirst: false });

    const from = document.getElementById('filter-from').value;
    const to = document.getElementById('filter-to').value;
    query = applyDateRange(query, tab.dateColumn, from, to);

    const { data, error } = await query;
    if (error) {
      document.getElementById('orders-list').innerHTML = '<p style="color:var(--sale);">Error loading orders: ' + error.message + '</p>';
      return;
    }
    allOrders = data || [];
    renderOrders();
  }

  function escapeAttr(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
  }

  function copyIconSVG() {
    return '<svg viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="11" height="11" rx="1.5" stroke="currentColor" stroke-width="1.8"/><path d="M5 15V5a1 1 0 0 1 1-1h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
  }

  function copyRow(value, innerHTML) {
    return (
      '<div class="copyable-row">' +
        (innerHTML || '<span>' + value + '</span>') +
        '<button type="button" class="copy-btn" data-copy-value="' + escapeAttr(value) + '" aria-label="Copy">' + copyIconSVG() + '</button>' +
      '</div>'
    );
  }

  function orderCardHTML(o) {
    const time = new Date(o.created_at).toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    const fullAddress = o.district + ' — ' + o.address;
    return (
      '<div class="order-card' + (o.is_cancelled ? ' is-cancelled' : '') + '" data-id="' + o.id + '">' +
        '<div class="order-card-top">' +
          '<div><div class="order-card-id">' + o.order_id + (o.is_cancelled ? '<span class="order-card-badge">Cancelled</span>' : '') + '</div>' +
          '<div class="order-card-name">' + o.name + '</div></div>' +
          '<div class="order-card-time">' + time + '</div>' +
        '</div>' +
        copyRow(o.name) +
        copyRow(o.phone, '<span class="order-card-phone-value"><a href="tel:' + o.phone + '">' + o.phone + '</a></span>') +
        copyRow(fullAddress, '<span class="order-card-address-value">' + fullAddress + '</span>') +
        '<div class="order-card-items">' + o.items + '</div>' +
        '<div class="order-card-price-row"><span>Total</span><span>৳' + o.total + '</span></div>' +
        '<div class="order-card-controls">' +
          '<label class="toggle-row"><span>Confirmed</span>' +
            '<span class="toggle-switch"><input type="checkbox" class="confirm-toggle" ' + (o.is_confirmed ? 'checked' : '') + '><span class="toggle-slider"></span></span>' +
          '</label>' +
          '<label class="toggle-row"><span>Dispatched</span>' +
            '<span class="toggle-switch"><input type="checkbox" class="dispatch-toggle" ' + (o.is_dispatched ? 'checked' : '') + '><span class="toggle-slider"></span></span>' +
          '</label>' +
          '<label class="toggle-row"><span>Cancelled</span>' +
            '<span class="toggle-switch toggle-danger"><input type="checkbox" class="cancel-toggle" ' + (o.is_cancelled ? 'checked' : '') + '><span class="toggle-slider"></span></span>' +
          '</label>' +
          '<div class="dispatch-date-field">' +
            '<label>Dispatch Date</label>' +
            '<input type="date" class="dispatch-date-input" value="' + (o.dispatch_date || '') + '">' +
          '</div>' +
        '</div>' +
      '</div>'
    );
  }

  function renderOrders() {
    const search = document.getElementById('filter-search').value.trim().toLowerCase();
    let filtered = allOrders;
    if (search) {
      filtered = allOrders.filter(function (o) {
        return (o.name || '').toLowerCase().includes(search) ||
               (o.phone || '').toLowerCase().includes(search) ||
               (o.order_id || '').toLowerCase().includes(search);
      });
    }
    document.getElementById('orders-empty').style.display = filtered.length === 0 ? 'block' : 'none';
    document.getElementById('orders-list').innerHTML = filtered.map(orderCardHTML).join('');
  }

  /* ---------- Copy buttons ---------- */
  document.getElementById('orders-list').addEventListener('click', function (e) {
    const copyBtn = e.target.closest('.copy-btn');
    if (!copyBtn) return;
    const val = copyBtn.getAttribute('data-copy-value');
    navigator.clipboard.writeText(val).then(function () {
      copyBtn.classList.add('copied');
      setTimeout(function () { copyBtn.classList.remove('copied'); }, 1000);
    }).catch(function () {
      showToast('Could not copy — try selecting the text manually');
    });
  });

  /* ---------- Toggles + dispatch date ---------- */
  document.getElementById('orders-list').addEventListener('change', async function (e) {
    const card = e.target.closest('.order-card');
    if (!card) return;
    const id = card.getAttribute('data-id');

    if (e.target.classList.contains('confirm-toggle')) {
      const checked = e.target.checked;
      const updates = { is_confirmed: checked, confirmed_at: checked ? new Date().toISOString() : null };
      const existing = allOrders.find(function (o) { return o.id === id; });
      if (checked && existing && !existing.dispatch_date) {
        updates.dispatch_date = suggestedDispatchDate();
      }
      await supabaseClient.from('orders').update(updates).eq('id', id);
      showToast(checked ? 'Marked confirmed' : 'Unmarked confirmed');
      loadOrders();
    }

    if (e.target.classList.contains('dispatch-toggle')) {
      const checked = e.target.checked;
      const updates = { is_dispatched: checked, dispatched_at: checked ? new Date().toISOString() : null };
      /* Whatever the planned dispatch date was, the moment it's actually
         dispatched, TODAY (Bangladesh calendar day) becomes the real
         dispatch date — this is what reporting should reflect. */
      if (checked) updates.dispatch_date = bdDateString(0);
      await supabaseClient.from('orders').update(updates).eq('id', id);
      showToast(checked ? 'Marked dispatched' : 'Unmarked dispatched');
      loadOrders();
    }

    if (e.target.classList.contains('cancel-toggle')) {
      const checked = e.target.checked;
      const updates = { is_cancelled: checked, cancelled_at: checked ? new Date().toISOString() : null };
      await supabaseClient.from('orders').update(updates).eq('id', id);
      showToast(checked ? 'Order cancelled' : 'Cancellation undone');
      loadOrders();
    }

    if (e.target.classList.contains('dispatch-date-input')) {
      const val = e.target.value || null;
      await supabaseClient.from('orders').update({ dispatch_date: val }).eq('id', id);
      loadOrders();
    }
  });

  (async function init() {
    const staffRow = await requireStaff();
    if (!staffRow) return;
    document.getElementById('admin-loading-gate').style.display = 'none';
    document.getElementById('admin-app').style.display = '';
    if (staffRow.role === 'admin') {
      document.getElementById('nav-reports-link').style.display = '';
      document.getElementById('nav-team-link').style.display = '';
      document.getElementById('drawer-reports-link').style.display = '';
      document.getElementById('drawer-team-link').style.display = '';
    }
    loadOrders();
  })();
})();
</script>
</body>
</html>
